        "eSIM: ‘онлайн төлбөр + автомат QR’ → хугацаа/зардал буурна."
      ]
    },
  ];

  const content = document.getElementById("content");
  const toc = document.getElementById("toc");

  function makeCard(item){
    const id = "q" + item.n;

    const card = document.createElement("article");
    card.className = "card";
    card.id = id;

    const h2 = document.createElement("h2");
    h2.innerHTML = `<span class="qnum">${item.n}</span> ${item.q}`;
    card.appendChild(h2);

    const row = document.createElement("div");
    row.className = "row";

    const left = document.createElement("div");
    left.className = "block";
    left.innerHTML = `<div class="label">Тодорхойлолт</div>`;
    const ul = document.createElement("ul");
    item.def.forEach(t => {
      const li = document.createElement("li");
      li.textContent = t;
      ul.appendChild(li);
    });
    left.appendChild(ul);

    const right = document.createElement("div");
    right.className = "block";
    right.innerHTML = `<div class="label">Түлхүүр үг</div>`;
    const chips = document.createElement("div");
    chips.className = "chips";
    item.keys.forEach(k => {
      const s = document.createElement("span");
      s.className = "chip";
      s.textContent = k;
      chips.appendChild(s);
    });
    right.appendChild(chips);

    row.appendChild(left);
    row.appendChild(right);
    card.appendChild(row);

    // ✅ NEW: brief answer text (between definition and example)
    const brief = document.createElement("div");
    brief.className = "briefAnswer";
    brief.innerHTML = `<b>Товч хариулт:</b> ${item.short}`;
    card.appendChild(brief);

    // Example details (existing structure kept)
    const details = document.createElement("details");
    const summary = document.createElement("summary");
    summary.textContent = "Жишээ";
    details.appendChild(summary);

    // Book definition inside example
    const book = document.createElement("div");
    book.className = "bookNote";
    book.innerHTML = `
      <p><b>Номоос (summary):</b> ${item.book}</p>
    `;
    details.appendChild(book);

    // Example text
    const ex = document.createElement("div");
    ex.className = "ex";
    ex.innerHTML = `<b>${exampleSystemName} жишээ:</b><br/>` + item.ex.map(x => "• " + x).join("<br/>");
    details.appendChild(ex);

    card.appendChild(details);
    return card;
  }

  function makeToc(item){
    const a = document.createElement("a");
    a.href = "#q" + item.n;
    a.textContent = item.n + ". " + item.q.replace(/\(.+?\)/g, "").slice(0, 44) + (item.q.length > 44 ? "…" : "");
    return a;
  }

  // Build
  data.sort((a,b)=>a.n-b.n);
  data.forEach(item => {
    content.appendChild(makeCard(item));
    toc.appendChild(makeToc(item));
  });

  // Navigation
  const counter = document.getElementById("counter");
  const prevBtn = document.getElementById("prev");
  const nextBtn = document.getElementById("next");

  const cards = () => Array.from(document.querySelectorAll(".card"));
  let idx = 0;

  function updateCounter(){
    const total = 29;
    const current = cards()[idx]?.id?.replace("q","") || "1";
    counter.textContent = `${current} / ${total}`;
  }

  function go(delta){
    const arr = cards();
    idx = Math.max(0, Math.min(arr.length - 1, idx + delta));
    arr[idx].scrollIntoView({behavior:"smooth", block:"start"});
    updateCounter();
  }

  prevBtn.addEventListener("click", () => go(-1));
  nextBtn.addEventListener("click", () => go(1));
  window.addEventListener("keydown", (e)=>{
    if(e.key === "ArrowRight") go(1);
    if(e.key === "ArrowLeft") go(-1);
  });

  // update counter on scroll
  const obs = new IntersectionObserver((entries)=>{
    const visible = entries.filter(e=>e.isIntersecting).sort((a,b)=>b.intersectionRatio-a.intersectionRatio)[0];
    if(!visible) return;
    const id = visible.target.id;
    const arr = cards();
    const newIdx = arr.findIndex(c=>c.id===id);
    if(newIdx >= 0){ idx = newIdx; updateCounter(); }
  }, {threshold:[0.25,0.5,0.75]});
  cards().forEach(c=>obs.observe(c));

  updateCounter();
</script>
</body>
</html>
